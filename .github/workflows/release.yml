name: Release

# Triggered by pushing a tag `v*`. Builds a universal macOS app bundle,
# ad-hoc signs it, packages a DMG, creates a GitHub Release with the DMG
# attached, and commits a cask version/sha256 bump to `main`.
#
# No Apple Developer ID required — ad-hoc signing is sufficient because the
# Cask's postflight block strips the quarantine xattr on install.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode (for universal Swift builds)
        run: |
          # Pick the newest Xcode.app installed on the runner.
          xcode_path=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n1)
          echo "Selected: $xcode_path"
          sudo xcode-select -s "$xcode_path"
          xcodebuild -version
          swift --version

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Extract release summary
        id: summary
        run: |
          SUMMARY=$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:subject)' | head -n1)
          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "$GITHUB_REF_NAME" ]; then
            SUMMARY=$(git log -1 --format=%s "$GITHUB_SHA")
          fi
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Build universal .app
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ github.run_number }}
          UNIVERSAL: "1"
        run: zsh scripts/build-app.sh

      - name: Import signing certificate
        id: signing
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "::warning::MACOS_CERT_P12 not set — using ad-hoc signing; app permissions will"
            echo "::warning::reset on every update until the self-signed cert secret is added."
            echo "identity=-" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KC="$RUNNER_TEMP/voice-signing.keychain-db"
          KCPW=$(openssl rand -base64 16)
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" -k "$KC" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KC" >/dev/null
          # Make our keychain searchable so codesign finds the identity.
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          echo "identity=Voice Self-Signed" >> "$GITHUB_OUTPUT"
          echo "imported self-signed certificate ✓"

      - name: Sign .app
        env:
          IDENTITY: ${{ steps.signing.outputs.identity }}
        run: zsh scripts/sign.sh

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: zsh scripts/make-dmg.sh

      - name: Compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/Voice-$VERSION.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "$SHA  $DMG"

      - name: Sign update & generate appcast
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ github.run_number }}
          SUMMARY: ${{ steps.summary.outputs.summary }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "::warning::SPARKLE_PRIVATE_KEY secret not set — skipping appcast. In-app updates"
            echo "::warning::won't be offered until you add the secret (see release docs). DMG still ships."
            exit 0
          fi
          zsh scripts/make-appcast.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # appcast.xml is absent only when the Sparkle secret is unset; don't fail the release.
          files: |
            dist/Voice-${{ steps.version.outputs.version }}.dmg
            dist/appcast.xml
          fail_on_unmatched_files: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## What Changed

            ${{ steps.summary.outputs.summary }}

            ## Install

            ```bash
            brew tap rbmrs/voice https://github.com/rbmrs/voice
            brew trust rbmrs/voice   # required on Homebrew 6.0+
            brew install --cask voice
            ```

            Requires macOS 14 (Sonoma) or later. `whisper-cpp` + `llama.cpp` pulled in as Cask deps.

            Prefer the Cask over the raw DMG — direct DMG downloads are ad-hoc signed
            and Gatekeeper will block them unless you run
            `xattr -dr com.apple.quarantine /Applications/Voice.app` first.

            ## SHA256

            ```
            ${{ steps.sha.outputs.sha }}  Voice-${{ steps.version.outputs.version }}.dmg
            ```

      - name: Bump Casks/voice.rb on main
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          git fetch origin main
          git checkout main
          /usr/bin/sed -i '' -E "s/^  version \".*\"/  version \"$VERSION\"/" Casks/voice.rb
          /usr/bin/sed -i '' -E "s/^  sha256 \"[a-f0-9]{64}\"/  sha256 \"$SHA\"/" Casks/voice.rb
          if git diff --quiet Casks/voice.rb; then
            echo "Cask already up-to-date, skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/voice.rb
          git commit -m "chore(cask): bump voice to $VERSION"
          git push origin main
